name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Testar aplicação (opcional)
      run: echo "Sem testes por enquanto"

    - name: Deploy no Railway (se configurado)
      run: echo "Railway cuida do deploy automaticamente ao conectar com GitHub"
